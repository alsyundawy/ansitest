- name: Install all security updates with automatic reboots
  hosts: win11
  gather_facts: false
  become: yes
  become_method: runas
  become_user: SYSTEM
  tasks:
    - name: Install + auto reboot
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
        reboot: true
        reboot_timeout: 600 # 10 min
        
- name: Install all security, critical, and rollup updates without a scheduled task
  hosts: win11
  gather_facts: false
  tasks:
    - name: Install security, crit, rollup updates
      ansible.windows.win_updates:
        category_names:
           - SecurityUpdates
           - CriticalUpdates
           - UpdateRollups
      become: true
      become_method: runas
      become_user: SYSTEM

- name: Restart Windows Update Service
  hosts: win11
  gather_facts: false
  tasks:
    - name: Restart svc wuauserv
      ansible.windows.win_service:
        name: wuauserv
        state: restarted

