---
- hosts: win11
  become: false
  gather_facts: false
  tasks:
    - name: Check instance connectivity (early abort if target is down)
      ansible.builtin.wait_for_connection:
        timeout: 35
      ignore_unreachable: true
      register: reachability_check

    - name: This Task only runs if instance = reachable
      ansible.builtin.debug:
        msg: "Host is reachable!"
      when: reachability_check is not unreachable

    - name: "[{{ inventory_hostname }}] Run Update Session Orchestrator check to clear GUI cached results"
      ansible.windows.win_shell: |
        UsoClient RefreshSettings
        UsoClient ScanInstallWait

    - name: Clear Windows Update cache
      ansible.windows.win_shell: Remove-Item -Path "C:\Windows\SoftwareDistribution\Download\*" -Recurse -Force

- name: Search-only, return list of found updates if any, log to C\ .txt file
  hosts: win11
  gather_facts: false
  tasks:
    - name: Log found updates to file
      ansible.windows.win_updates:
        category_names: SecurityUpdates
        state: searched
        log_path: C:\ansible_winupdts-list.txt

- name: Show Free Space on Windows C Drive
  hosts: win11
  tasks:
    - name: Get free space on C drive
      ansible.windows.win_shell: 
        (Get-PSDrive C).Free / 1MB
      register: c_drive_free_mb
    - name: Display free space
      ansible.builtin.debug:
        msg: "Free space on C: {{ c_drive_free_mb.stdout | trim | float | round(2) }} MB"
      ansible.builtin.debug:
        var: c_drive_free_mb.stdout_lines

# Search and download Windows updates
- name: Search and download Windows updates without installing them - NOTE need enough free space on C drive
  hosts: win11
  gather_facts: false
  become: yes
  become_method: runas
  become_user: SYSTEM
  tasks:
    - name: Download available Win updates
      ansible.windows.win_updates:
        state: downloaded
        log_path: C:\ansible_winupdts-download.txt

